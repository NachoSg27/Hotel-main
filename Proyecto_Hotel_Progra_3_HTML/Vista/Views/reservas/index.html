<!DOCTYPE html>
<!-- Pagina de reserva/contacto -->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas</title>
</head>
<body>
    <header>
        <h1>Formulario de reserva</h1>
         <h2>Completa el formulario y te responderemos en breve.</h2>
    </header>

    <main>
        <!-- form recibe datos del usuario -->
        <form action="#" method="post">
            <label for="nombre">Nombre:</label><br>
            <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre completo"  required><br><br>
        <!-- Contraseña -->
            <label for="password">Contraseña:</label><br>
            <input type="password" id="password" name="password" placeholder="Ingresar Contraseña" required><br><br>            
        <!-- Correo -->
            <label for="correo">Correo:</label><br>
            <input type="email" id="correo" name="correo" placeholder="Ingresar correo"required><br><br>
        <!-- Fecha ingreso -->
            <label for="fecha">Fecha de llegada:</label><br>
            <input type="date" id="fecha" name="fecha" required><br><br>
        <!-- Fecha salida -->
            <label for="fecha">Fecha de Salida:</label><br>
            <input type="date" id="fecha" name="fecha" required><br><br>
       <!-- Cantidad de personas -->
            <label for="personas">Cantidad de Personas:</label><br>
            <input type="number" id="personas" name="personas" min="1" required><br><br>
            
            <!-- tamaño y ancho del cuadro para recibir los comentarios -->
            <label for="comentario">Comentario:</label><br>
            <textarea id="comentario" name="comentario" rows="4" cols="40"></textarea><br><br>

            <button type="submit">Enviar</button>
        </form>
    </main>

    <footer>
        <a href="../inicio/index.html">Volver a Inicio</a>
    </footer>
</body>
</html>
